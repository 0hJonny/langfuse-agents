version: "2"
sql:
  - schema: "/sql/auth/schema/"
    queries: "/sql/auth/queries/"
    engine: "postgresql"
    gen:
      go:
        package: "postgres"
        out: "internal/auth/storage/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
            - db_type: "auth.user_role"
              go_type: "github.com/0hJonny/langfuse-agents/internal/auth/domain.UserRole"
            - db_type: "timestamptz"
              go_type: "time.Time"

  - schema: "/sql/chats/schema/"
    queries: "/sql/chats/queries/"
    engine: "postgresql"
    gen:
      go:
        package: "postgres"
        out: "internal/chats/storage/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
            - db_type: "chats.message_role"
              go_type: "github.com/0hJonny/langfuse-agents/internal/chats/domain.MessageRole"
            - db_type: "chats.feedback_rating"
              go_type: "github.com/0hJonny/langfuse-agents/internal/chats/domain.FeedbackRating"
            - db_type: "timestamptz"
              go_type: "time.Time"